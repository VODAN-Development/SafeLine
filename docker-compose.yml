version: '3.8'
services:
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: fieldlab7-fuseki
    ports:
      - "${PORT:-3030}:3030"
    environment:
      - FUSEKI_DATASET_1=sord
      - FUSEKI_DATASET_1_RW=sord
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - fuseki_data:/fuseki
    command: "/jena-fuseki/fuseki-server --update --mem /sord"
    restart: unless-stopped

volumes:
  fuseki_data:
