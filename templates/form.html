<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeLine – FieldLab 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #eef2f7; font-family: "Inter", sans-serif; }
        .navbar-brand { font-weight: 700; }
        .role-badge { font-size: 0.85rem; }
        .card { border-radius: 14px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.07); }
        .section-title {
            font-weight: 600; font-size: 1.15rem;
            border-bottom: 2px solid #e1e5ea; padding-bottom: 6px;
            margin-bottom: 18px;
        }
        .form-control, .form-select { border-radius: 10px; }
        body.dark { background: #111827; color: #e5e7eb; }
        body.dark .card { background: #1f2933; color: #e5e7eb; }
        body.dark .navbar { background: #111; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand">SafeLine – Reporter</span>
        <div class="ms-auto d-flex align-items-center gap-3">
            <button id="convertUploadReporter" class="btn btn-sm btn-success">Convert & Upload to Fuseki</button>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="card p-4 mx-auto" style="max-width: 900px;">
        <h4 class="mb-4">Submit New Incident Report</h4>
        
        <form id="reportForm">
            <div class="row g-3 mb-4">
                <div class="col-12 section-title mt-4">Meta Data</div>
                <div class="col-md-6">
                    <label class="form-label">Incident ID</label>
                    <input type="text" name="incident_id" class="form-control" placeholder="Leave blank to auto-generate">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Org ID / Input By</label>
                    <div class="input-group">
                        <input type="text" name="org_id" class="form-control" placeholder="Org ID">
                        <input type="text" name="input_by" class="form-control" placeholder="Reporter's Name">
                    </div>
                </div>

                <div class="col-12 section-title mt-4">Incident Details</div>
                <div class="col-md-4">
                    <label class="form-label">Incident Date</label>
                    <input type="date" name="incident_date" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Time Range</label>
                    <select name="incident_time_range" class="form-select">
                        <option value="Unknown" selected>Unknown</option>
                        <option value="Morning">Morning</option>
                        <option value="Afternoon">Afternoon</option>
                        <option value="Evening">Evening</option>
                        <option value="Night">Night</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Violence Type</label>
                    <select name="violence_type" class="form-select" required>
                        <option value="Rape">Rape</option>
                        <option value="Sexual Assault">Sexual Assault</option>
                        <option value="Physical Harassment">Physical Harassment</option>
                        <option value="Verbal Harassment">Verbal Harassment</option>
                        <option value="Domestic Violence">Domestic Violence</option>
                        <option value="Other" selected>Other</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Short Description</label>
                    <textarea name="short_desc" class="form-control" rows="2"></textarea>
                </div>

                <div class="col-12 section-title mt-4">Location</div>
                <div class="col-md-6">
                    <label class="form-label">Country / State</label>
                    <div class="input-group">
                        <input type="text" name="country" class="form-control" placeholder="Country">
                        <input type="text" name="state" class="form-control" placeholder="State">
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Town / Village / Camp</label>
                    <div class="input-group">
                        <input type="text" name="town" class="form-control" placeholder="Town">
                        <input type="text" name="village" class="form-control" placeholder="Village">
                        <input type="text" name="camp" class="form-control" placeholder="Camp">
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Latitude</label>
                    <input type="number" step="any" name="latitude" class="form-control" placeholder="e.g. 15.321">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Longitude</label>
                    <input type="number" step="any" name="longitude" class="form-control" placeholder="e.g. 32.541">
                </div>

                <div class="col-12 section-title mt-4">Victims & Perpetrators</div>
                <div class="col-md-4">
                    <label class="form-label">Number of Victims</label>
                    <input type="number" name="num_victims" class="form-control" value="1">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Victim Age</label>
                    <input type="number" name="victim_age" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Victim Gender</label>
                    <select name="victim_gender" class="form-select">
                        <option value="Unknown" selected>Unknown</option>
                        <option value="Female">Female</option>
                        <option value="Male">Male</option>
                        <option value="Non-binary">Non-binary</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Number of Perpetrators</label>
                    <input type="number" name="num_perpetrators" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Perpetrator Affiliation</label>
                    <input type="text" name="perp_affiliation" class="form-control">
                </div>

            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2 mt-2">
                Submit Report Data
            </button>
        </form>
    </div>
</div>

<script>
    // Form Submission via AJAX (to handle validation output safely)
    document.getElementById('reportForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Validating and Submitting...';

        const formData = new FormData(this);

        fetch('{{ url_for("submit") }}', {
            method: 'POST',
            body: formData
        }).then(async (resp) => {
            const data = await resp.json();
            if (data.success) {
                alert('Success: ' + data.message);
                document.getElementById('reportForm').reset();
            } else {
                let errorMsg = data.message;
                if (data.errors && data.errors.length > 0) {
                    errorMsg += '\n- ' + data.errors.join('\n- ');
                }
                alert('Submission Failed:\n' + errorMsg);
            }
        }).catch((err) => {
            alert('Request failed: ' + err);
        }).finally(() => {
            btn.disabled = false;
            btn.textContent = 'Submit Report Data';
        });
    });

    // Convert & Upload button
    const convertBtn = document.getElementById('convertUploadReporter');
    if (convertBtn) {
        convertBtn.addEventListener('click', function () {
            const btn = this;
            btn.disabled = true;
            btn.textContent = 'Uploading to Fuseki...';

            fetch('{{ url_for("convert_and_upload") }}', {
                method: 'POST',
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            }).then(async (resp) => {
                const data = await resp.json();
                if (data.success) {
                    alert('Convert & upload succeeded: ' + data.message);
                } else {
                    alert('Convert & upload failed: ' + (data.message || 'Unknown error'));
                }
            }).catch((err) => {
                alert('Convert & upload request failed: ' + err);
            }).finally(() => {
                btn.disabled = false;
                btn.textContent = 'Convert & Upload to Fuseki';
            });
        });
    }
</script>

</body>
</html>
